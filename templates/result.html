<!DOCTYPE html>
<html>
  <head>
    <title>Processed Result</title>
  </head>
  <body>
    <h1>Tokenized Words & Frequencies</h1>

    <h2>Tokens:</h2>
    <ul>
      {% for token in tokens %}
      <li>{{ token }}</li>
      {% endfor %}
    </ul>

    <h2>Word Frequencies:</h2>
    <ul>
      {% for word, count in frequency.items() %}
      <li>{{ word }}: {{ count }}</li>
      {% endfor %}
    </ul>

    <br /><a href="/">Go Back</a>
  </body>
</html>
